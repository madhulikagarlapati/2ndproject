<!DOCTYPE html>
<html>
<head>
<title>RetroDrive</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
transition:0.4s;
}

body.light{
background:white;
color:black;
}

body.light #image-container{
background:white;
}

body.light #login-container{
background:#f3f3f3;
color:black;
}

body.light button{
background:black;
color:white;
}



#theme-btn{
position:fixed;
top:20px;
right:20px;
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
}



#error{
color:red;
font-size:14px;
margin-top:10px;
}
#image-container h1{
font-family:'Times New Roman', Times, serif;
position:absolute;
top:20px;
left:0;
width:100%;
text-align:center;
}


#image-container{
position:absolute;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
transition:opacity 1.5s ease;
background:black;
}

#image-container img{
width:100%;
max-width:900px;
border-radius:15px;
box-shadow:0 0 25px rgba(255,255,255,0.3);
}


#login-container{
font-family: Arial, Helvetica, sans-serif;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
opacity:0;
background:white;
color:black;
padding:40px;
border-radius:12px;
text-align:center;
transition:opacity 1.5s ease;
pointer-events:none;
width:300px;
}

#login-container.show{
opacity:1;
pointer-events:auto;
}

h1{
margin-top:0;
letter-spacing:2px;
}

p{
color:gray;
font-size:14px;
margin-bottom:20px;
}

input, select{
padding:10px;
width:90%;
margin:5px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:10px 20px;
background:black;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#333;
}

</style>
</head>

<body>

<button id="theme-btn" onclick="changeTheme()">Toggle Theme</button>

<div id="image-container">
<h1>WELCOME TO RETRO DRIVE</h1>
<img src="car.png" alt="car">
</div>

<div id="login-container">

<h1>Welcome to RetroDrive</h1>
<p>Enter the world of speed and precision</p>

<input id="username" type="text" placeholder="Username">
<input id="email" type="email" placeholder="Email Address">
<input id="password" type="password" placeholder="Password">
<input id="confirm" type="password" placeholder="Confirm Password">

<select id="brand">
<option value="">Select Favorite Car Brand</option>
<option>BMW</option>
<option>Audi</option>
<option>Porsche</option>
<option>Ferrari</option>
<option>Lamborghini</option>
</select>

<br>

<button onclick="validateForm()">Enter Garage</button>

<div id="error"></div>

</div>

<script>



var imageContainer = document.getElementById("image-container");
var login = document.getElementById("login-container");

setTimeout(function(){

imageContainer.style.opacity="0";

setTimeout(function(){

imageContainer.style.display="none";
login.classList.add("show");

},1500);

},3000);


function changeTheme(){
document.body.classList.toggle("light");
}

function validateForm(){

var username=document.getElementById("username").value;
var email=document.getElementById("email").value;
var password=document.getElementById("password").value;
var confirm=document.getElementById("confirm").value;
var brand=document.getElementById("brand").value;
var error=document.getElementById("error");

error.innerHTML="";

try{

if(username==="")
throw "Username cannot be empty";

if(email==="")
throw "Email is required";

if(!email.includes("@"))
throw "Invalid email format";

if(password.length<6)
throw "Password must be at least 6 characters";

if(password!==confirm)
throw "Passwords do not match";

if(brand==="")
throw "Please select a car brand";

window.location.href="carshowroom.html";

}

catch(e){

error.innerHTML=e;

}

}

</script>

</body>
</html>
